openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Beacon Nonprofit Management Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: safehouses
    description: Safehouse management
  - name: partners
    description: Partner organizations
  - name: supporters
    description: Donor/supporter management
  - name: donations
    description: Donation records
  - name: residents
    description: Resident case management
  - name: processRecordings
    description: Session/process recordings
  - name: homeVisitations
    description: Home visitation records
  - name: caseConferences
    description: Case conference records
  - name: interventionPlans
    description: Intervention and care plans
  - name: incidents
    description: Incident reports
  - name: educationRecords
    description: Education progress records
  - name: healthRecords
    description: Health and wellbeing records
  - name: socialMedia
    description: Social media posts and analytics
  - name: impactSnapshots
    description: Public impact snapshots
  - name: mlPredictions
    description: ML prediction snapshots
  - name: reports
    description: Reports and analytics
  - name: dashboard
    description: Dashboard summaries
  - name: users
    description: User management (super admin)
  - name: auditLogs
    description: Audit and activity logs

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ─────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── DASHBOARD SUMMARIES ──────────────────────────────────────────────────
  /dashboard/admin-summary:
    get:
      operationId: getAdminDashboardSummary
      tags: [dashboard]
      summary: Admin command center summary
      parameters:
        - name: safehouses
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Admin dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardSummary"

  /dashboard/donor-summary:
    get:
      operationId: getDonorDashboardSummary
      tags: [dashboard]
      summary: Donor portal summary for current user
      responses:
        "200":
          description: Donor dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonorDashboardSummary"

  /dashboard/executive-summary:
    get:
      operationId: getExecutiveDashboardSummary
      tags: [dashboard]
      summary: Super admin executive summary
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Executive dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutiveDashboardSummary"

  /dashboard/public-impact:
    get:
      operationId: getPublicImpact
      tags: [dashboard]
      summary: Public-facing impact metrics
      responses:
        "200":
          description: Public impact summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicImpactSummary"

  # ─── SAFEHOUSES ───────────────────────────────────────────────────────────
  /safehouses:
    get:
      operationId: listSafehouses
      tags: [safehouses]
      summary: List all safehouses
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of safehouses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafehouseListResponse"
    post:
      operationId: createSafehouse
      tags: [safehouses]
      summary: Create safehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSafehouseBody"
      responses:
        "201":
          description: Created safehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Safehouse"

  /safehouses/{id}:
    get:
      operationId: getSafehouse
      tags: [safehouses]
      summary: Get safehouse by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Safehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Safehouse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSafehouse
      tags: [safehouses]
      summary: Update safehouse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSafehouseBody"
      responses:
        "200":
          description: Updated safehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Safehouse"
    delete:
      operationId: deleteSafehouse
      tags: [safehouses]
      summary: Delete safehouse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /safehouses/{id}/metrics:
    get:
      operationId: getSafehouseMetrics
      tags: [safehouses]
      summary: Get monthly metrics for a safehouse
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: months
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Safehouse metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SafehouseMonthlyMetric"

  # ─── PARTNERS ─────────────────────────────────────────────────────────────
  /partners:
    get:
      operationId: listPartners
      tags: [partners]
      summary: List partners
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: programArea
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Partner list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerListResponse"
    post:
      operationId: createPartner
      tags: [partners]
      summary: Create partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartnerBody"
      responses:
        "201":
          description: Created partner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"

  /partners/{id}:
    get:
      operationId: getPartner
      tags: [partners]
      summary: Get partner by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Partner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePartner
      tags: [partners]
      summary: Update partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePartnerBody"
      responses:
        "200":
          description: Updated partner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
    delete:
      operationId: deletePartner
      tags: [partners]
      summary: Delete partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /partner-assignments:
    get:
      operationId: listPartnerAssignments
      tags: [partners]
      summary: List partner assignments
      parameters:
        - name: partnerId
          in: query
          schema:
            type: integer
        - name: safehouseId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Partner assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartnerAssignment"
    post:
      operationId: createPartnerAssignment
      tags: [partners]
      summary: Create partner assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePartnerAssignmentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerAssignment"

  /partner-assignments/{id}:
    delete:
      operationId: deletePartnerAssignment
      tags: [partners]
      summary: Remove partner assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── SUPPORTERS ───────────────────────────────────────────────────────────
  /supporters:
    get:
      operationId: listSupporters
      tags: [supporters]
      summary: List supporters (donors)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: supportType
          in: query
          schema:
            type: string
        - name: segment
          in: query
          schema:
            type: string
        - name: churnRisk
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Supporter list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupporterListResponse"
    post:
      operationId: createSupporter
      tags: [supporters]
      summary: Create supporter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupporterBody"
      responses:
        "201":
          description: Created supporter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supporter"

  /supporters/{id}:
    get:
      operationId: getSupporter
      tags: [supporters]
      summary: Get supporter by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supporter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supporter"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSupporter
      tags: [supporters]
      summary: Update supporter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupporterBody"
      responses:
        "200":
          description: Updated supporter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supporter"
    delete:
      operationId: deleteSupporter
      tags: [supporters]
      summary: Delete supporter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /supporters/me:
    get:
      operationId: getMyDonorProfile
      tags: [supporters]
      summary: Get current donor's profile
      responses:
        "200":
          description: Donor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supporter"

  /supporters/{id}/giving-stats:
    get:
      operationId: getSupporterGivingStats
      tags: [supporters]
      summary: Get giving statistics for a supporter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Giving statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GivingStats"

  /supporters/stats:
    get:
      operationId: getSupporterStats
      tags: [supporters]
      summary: Aggregate supporter statistics
      responses:
        "200":
          description: Supporter stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupporterStats"

  # ─── DONATIONS ─────────────────────────────────────────────────────────────
  /donations:
    get:
      operationId: listDonations
      tags: [donations]
      summary: List donations
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: supporterId
          in: query
          schema:
            type: integer
        - name: donationType
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Donation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonationListResponse"
    post:
      operationId: createDonation
      tags: [donations]
      summary: Create donation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDonationBody"
      responses:
        "201":
          description: Created donation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"

  /donations/{id}:
    get:
      operationId: getDonation
      tags: [donations]
      summary: Get donation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Donation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"
    patch:
      operationId: updateDonation
      tags: [donations]
      summary: Update donation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDonationBody"
      responses:
        "200":
          description: Updated donation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"
    delete:
      operationId: deleteDonation
      tags: [donations]
      summary: Delete donation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /donations/my-ledger:
    get:
      operationId: getMyDonationLedger
      tags: [donations]
      summary: Get current donor's donation history
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: dateFrom
          in: query
          schema:
            type: string
        - name: dateTo
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Donor's own donation ledger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonationListResponse"

  /donations/trends:
    get:
      operationId: getDonationTrends
      tags: [donations]
      summary: Donation trends over time
      parameters:
        - name: months
          in: query
          schema:
            type: integer
            default: 12
        - name: safehouseId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Monthly donation trends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DonationTrend"

  /in-kind-donation-items:
    get:
      operationId: listInKindDonationItems
      tags: [donations]
      summary: List in-kind donation items
      parameters:
        - name: donationId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      security:
        - bearerAuth: []
      responses:
        "200":
          description: In-kind donation items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InKindDonationItem"
    post:
      operationId: createInKindDonationItem
      tags: [donations]
      summary: Create in-kind donation item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInKindDonationItemBody"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InKindDonationItem"

  /in-kind-donation-items/{id}:
    get:
      operationId: getInKindDonationItem
      tags: [donations]
      summary: Get in-kind donation item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InKindDonationItem"
    delete:
      operationId: deleteInKindDonationItem
      tags: [donations]
      summary: Delete in-kind donation item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /donation-allocations:
    get:
      operationId: listDonationAllocations
      tags: [donations]
      summary: List donation allocations
      parameters:
        - name: donationId
          in: query
          schema:
            type: integer
        - name: safehouseId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Allocations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DonationAllocation"
    post:
      operationId: createDonationAllocation
      tags: [donations]
      summary: Create donation allocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDonationAllocationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonationAllocation"

  # ─── RESIDENTS ────────────────────────────────────────────────────────────
  /residents:
    get:
      operationId: listResidents
      tags: [residents]
      summary: List residents
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: safehouseId
          in: query
          schema:
            type: integer
        - name: caseStatus
          in: query
          schema:
            type: string
        - name: riskLevel
          in: query
          schema:
            type: string
        - name: assignedWorkerId
          in: query
          schema:
            type: integer
        - name: reintegrationStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resident list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentListResponse"
    post:
      operationId: createResident
      tags: [residents]
      summary: Create resident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResidentBody"
      responses:
        "201":
          description: Created resident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resident"

  /residents/{id}:
    get:
      operationId: getResident
      tags: [residents]
      summary: Get resident by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resident"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateResident
      tags: [residents]
      summary: Update resident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResidentBody"
      responses:
        "200":
          description: Updated resident
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resident"
    delete:
      operationId: deleteResident
      tags: [residents]
      summary: Delete resident record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /residents/stats:
    get:
      operationId: getResidentStats
      tags: [residents]
      summary: Aggregate resident statistics
      parameters:
        - name: safehouseId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Resident stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResidentStats"

  /residents/{id}/timeline:
    get:
      operationId: getResidentTimeline
      tags: [residents]
      summary: Get full timeline of case events for a resident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEvent"

  # ─── PROCESS RECORDINGS ───────────────────────────────────────────────────
  /process-recordings:
    get:
      operationId: listProcessRecordings
      tags: [processRecordings]
      summary: List process recordings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: residentId
          in: query
